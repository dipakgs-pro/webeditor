// CONTEXT CARD — replaces WebSessionGroup inside WA thread
// Renders the two-event lifecycle inline in the conversation
function ContextCard(p){
  var sessions=p.sessions||[];
  var sess=sessions[0]; // most recent
  if(!sess)return null;
  var isLive=sess.status==='Live';
  var isResolved=sess.status==='Resolved';
  var isDropped=sess.status==='Dropped';
  var isConcurrent=sess.status==='Concurrent'; // web+WA both active simultaneously
  var pastSessions=sessions.slice(1);

  // No green. Blue/indigo family for state.
  var borderCol=isLive?TEAL:isResolved?GB:isConcurrent?'#F59E0B':isDropped?'#94A3B8':'#EF4444';
  var labelCol=isLive?TEAL:isResolved?GB:isConcurrent?'#D97706':isDropped?'#64748B':'#DC2626';
  var dotAnim=isLive||isConcurrent?'glow 2s ease-in-out infinite':'none';
  var dotCol=isLive?TEAL:isResolved?GB:isConcurrent?'#F59E0B':isDropped?'#94A3B8':'#EF4444';

  // Concurrent edge case banner
  function ConcurrentBanner(){
    return ce('div',{style:{background:'#FFFBEB',borderBottom:'1px solid #FDE68A',
      padding:'6px 11px',display:'flex',alignItems:'center',gap:6}},
      ce('div',{style:{width:5,height:5,borderRadius:'50%',background:'#F59E0B',animation:'glow 2s ease-in-out infinite',flexShrink:0}}),
      ce('span',{style:{fontSize:11,fontWeight:700,color:'#B45309',flex:1}},'Customer is chatting on web while this WhatsApp conversation is open'),
      ce('span',{style:{fontSize:10,color:'#D97706'}},'Concurrent session'));
  }

  // Stats row (shown on resolve/drop)
  function StatsRow(){
    if(!sess.msgCount&&!sess.durationMin)return null;
    return ce('div',{style:{display:'flex',alignItems:'center',gap:10,
      padding:'5px 11px 6px',borderTop:'1px solid #F1F5F9'}},
      sess.msgCount?ce('div',{style:{display:'flex',alignItems:'center',gap:4,animation:'countIn .35s ease both'}},
        ce(MsgI,{sz:9,cl:'#94A3B8'}),
        ce('span',{style:{fontSize:10.5,color:'#64748B'}},sess.msgCount+' messages')):null,
      sess.durationMin?ce('div',{style:{display:'flex',alignItems:'center',gap:4,animation:'countIn .35s .08s ease both'}},
        ce(ClockI,{sz:9,cl:'#94A3B8'}),
        ce('span',{style:{fontSize:10.5,color:'#64748B'}},sess.durationMin+' min')):null);
  }

  // Fields grid — staggered reveal
  function FieldsGrid(){
    if(!isResolved||!sess.fields)return null;
    var labels={budget:'Budget',location:'Location',timeline:'Timeline'};
    var entries=Object.entries(sess.fields);
    var anim=['f1','f2','f3','f4'];
    return ce('div',{style:{background:'#F8FAFC',border:'1px solid #E2E8F0',
      borderRadius:7,padding:'8px 10px',
      display:'grid',gridTemplateColumns:'1fr 1fr',gap:'6px 12px',
      margin:'6px 0 2px'}},
      entries.map(function(entry,i){
        return ce('div',{key:i,className:anim[i]||'f4'},
          ce('div',{style:{fontSize:9,color:'#94A3B8',fontWeight:700,
            textTransform:'uppercase',letterSpacing:.5,marginBottom:2}},labels[entry[0]]||entry[0]),
          ce('div',{style:{fontSize:12,fontWeight:700,color:'#0F172A',lineHeight:1.3}},entry[1]));
      }));
  }

  // Past sessions (collapsed) — shows history
  function PastSessions(){
    if(!pastSessions.length)return null;
    return ce('div',{style:{borderTop:'1px solid #F1F5F9',padding:'6px 11px 7px'}},
      ce('div',{style:{fontSize:9.5,fontWeight:800,textTransform:'uppercase',
        letterSpacing:.5,color:'#94A3B8',marginBottom:5}},'Previous sessions'),
      ce('div',{style:{display:'flex',flexDirection:'column',gap:4}},
        pastSessions.slice(0,2).map(function(ps,i){
          var pc=ps.status==='Resolved'?GB:ps.status==='Dropped'?'#94A3B8':'#EF4444';
          return ce('div',{key:ps.id,style:{display:'flex',alignItems:'center',gap:7,
            padding:'4px 7px',background:'#F8FAFC',borderRadius:6,cursor:'pointer'},
            onClick:function(){p.onView(ps);}},
            ce('div',{style:{width:5,height:5,borderRadius:'50%',background:pc,flexShrink:0}}),
            ce('span',{style:{fontSize:10.5,color:'#64748B',flex:1}},'Session '+ps.id.slice(-4)+' \u00b7 '+ps.startedAt),
            ce('span',{style:{fontSize:10,fontWeight:700,color:pc}},ps.status),
            ce(ChevR,{sz:9,cl:'#CBD5E1'}));
        })));
  }

  return ce('div',{className:'ctx-card',style:{
    margin:'8px 16px 4px',
    borderRadius:10,overflow:'hidden',
    background:'#fff',
    border:'1px solid #E2E8F0',
    borderLeft:'3px solid '+borderCol,
    boxShadow:isLive?'0 1px 6px rgba(2,132,199,.08),0 0 0 3px rgba(2,132,199,.05)':'0 1px 3px rgba(15,23,42,.06)',
    transition:'box-shadow .3s,border-color .3s'}},

    // Concurrent warning banner
    isConcurrent?ce(ConcurrentBanner,null):null,

    // Header
    ce('div',{style:{display:'flex',alignItems:'center',gap:8,padding:'8px 11px 6px'}},
      ce('div',{style:{width:7,height:7,borderRadius:'50%',background:dotCol,flexShrink:0,
        boxShadow:isLive?'0 0 0 3px rgba(2,132,199,.18)':isConcurrent?'0 0 0 3px rgba(245,158,11,.18)':'none',
        animation:dotAnim}}),
      ce('span',{style:{fontSize:10.5,fontWeight:700,color:labelCol,flex:1}},
        isLive?'Web session active':isResolved?'Context injected':isConcurrent?'Concurrent web session':isDropped?'Session dropped':'Injection error'),
      ce('button',{onClick:function(e){e.stopPropagation();p.onView(sess);},
        style:{fontSize:10,fontWeight:700,color:TEAL,background:'transparent',border:'none',
          cursor:'pointer',padding:'2px 6px',borderRadius:4,fontFamily:'inherit'},
        onMouseEnter:function(e){e.currentTarget.style.background=TBGL;},
        onMouseLeave:function(e){e.currentTarget.style.background='transparent';}},'View')),

    // Event 1: conversation.create
    ce('div',{style:{padding:'0 11px 6px',borderBottom:'1px solid #F1F5F9'}},
      ce('div',{style:{display:'flex',alignItems:'center',gap:5,marginBottom:2}},
        ce('span',{style:{fontSize:9,fontWeight:800,color:TEAL,
          textTransform:'uppercase',letterSpacing:.6,
          padding:'1px 5px',background:'#F0F9FF',borderRadius:3}},'create'),
        ce('span',{style:{fontSize:10.5,color:'#64748B',fontWeight:500}},' \u00b7 '+sess.startedAt)),
      ce('div',{style:{fontSize:11,color:'#475569',lineHeight:1.5,marginBottom:2}},
        isLive?'Web session started \u00b7 contact matched by cookie'
        :isConcurrent?'Web session started while WhatsApp conversation is open'
        :'Web session started \u00b7 contact matched'),
      ce('div',{style:{fontSize:10,color:'#94A3B8',fontFamily:'ui-monospace,monospace'}},sess.sourceUrl)),

    // Event 2: conversation.resolve — shown post-live
    !isLive?ce('div',{style:{padding:'6px 11px 0',
      animation:isResolved?'slideUp .25s .1s cubic-bezier(.2,1,.4,1) both':'none'}},
      ce('div',{style:{display:'flex',alignItems:'center',gap:5,marginBottom:2}},
        ce('span',{style:{fontSize:9,fontWeight:800,
          color:isResolved?GB:isDropped?'#94A3B8':'#EF4444',
          textTransform:'uppercase',letterSpacing:.6,
          padding:'1px 5px',
          background:isResolved?GBL:isDropped?'#F8FAFC':'#FEF2F2',
          borderRadius:3}},'resolve'),
        ce('span',{style:{fontSize:10.5,color:'#64748B',fontWeight:500}},' \u00b7 '+(sess.injectedAt||sess.endedAt||''))),
      ce('div',{style:{fontSize:11,color:'#475569',lineHeight:1.5}},
        isResolved?'Lead context written to this thread \u00b7 contact record updated'
        :isDropped?'Session ended without handoff \u00b7 fields written to contact record'
        :'Injection failed \u00b7 check webhook logs'),
      ce(FieldsGrid,null)):null,

    // Stats row
    ce(StatsRow,null),

    // Past sessions
    ce(PastSessions,null));
}

      ce('div',{style:{padding:'10px '+px+'px 0'}},
        ce('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',fontSize:13,color:'#CBD5E1',marginBottom:12,cursor:'text'}},
          ce('span',null,'Message Ganesh Krishna or '),
          ce('button',{style:{border:'none',background:'none',cursor:'pointer',fontFamily:'inherit',fontSize:13,color:'#7C3AED',fontWeight:600}},'Try AI Reply')),
        ce('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',paddingBottom:10}},
          ce('div',{style:{display:'flex',gap:5,alignItems:'center'}},
            ce('button',{style:{width:28,height:28,border:'1px solid #E2E8F0',borderRadius:6,background:'#fff',cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}},'+'),
            ce('button',{style:{width:28,height:28,border:'1px solid #E2E8F0',borderRadius:6,background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}},ce(SmileyI,{sz:13,cl:'#64748B'})),
            ce('button',{style:{width:28,height:28,border:'1px solid #E2E8F0',borderRadius:6,background:'#fff',cursor:'pointer',fontSize:12,fontWeight:600,display:'flex',alignItems:'center',justifyContent:'center',color:'#64748B'}},'Aa'),
            ce('div',{style:{width:1,height:16,background:'#F1F5F9',margin:'0 1px'}}),

            ce('button',{style:{width:28,height:28,border:'1px solid #E2E8F0',borderRadius:6,background:'#fff',cursor:'pointer',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center'}},'📋'),
            ce('button',{style:{width:28,height:28,border:'1px solid #E2E8F0',borderRadius:6,background:'#fff',cursor:'pointer',fontSize:12,display:'flex',alignItems:'center',justifyContent:'center'}},'\u229e'),
            compact?null:ce('button',{style:{display:'flex',alignItems:'center',gap:5,padding:'5px 10px',border:'1px solid #DDD6FE',borderRadius:7,background:'#FAF5FF',cursor:'pointer',fontFamily:'inherit',fontSize:12,color:'#7C3AED',fontWeight:600,transition:'all .12s'},

      ce('div',{style:{padding:'0 '+px+'px 8px',fontSize:10,color:'#E2E8F0'}},'Create a strikethrough effect with >  followed by a space')));

// LEFT SIDEBAR
function LeftSidebar(){
  var ns=useState('inbox'),nav=ns[0],setNav=ns[1];
  var ITEMS=[
    {id:'home',I:function(p){return ce('svg',{width:18,height:18,viewBox:'0 0 24 24',fill:'none',stroke:p.cl||'#64748B',strokeWidth:1.8,strokeLinecap:'round',strokeLinejoin:'round'},ce('path',{d:'M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z'}),ce('polyline',{points:'9 22 9 12 15 12 15 22'}));}},
    {id:'inbox',I:InboxI},{id:'outbound',I:function(p){return ce('svg',{width:18,height:18,viewBox:'0 0 24 24',fill:'none',stroke:p.cl||'#64748B',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},ce('line',{x1:22,y1:2,x2:11,y2:13}),ce('polygon',{points:'22 2 15 22 11 13 2 9 22 2'}));}},{id:'contacts',I:ContactsI},
    {id:'grid',I:function(p){return ce('svg',{width:18,height:18,viewBox:'0 0 24 24',fill:'none',stroke:p.cl||'#64748B',strokeWidth:2,strokeLinecap:'round'},ce('circle',{cx:12,cy:12,r:10}),ce('line',{x1:2,y1:12,x2:22,y2:12}),ce('path',{d:'M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z'}));}},{id:'sett',I:SettI}
  ];
  return ce('div',{style:{width:52,flexShrink:0,background:GBD,display:'flex',flexDirection:'column',alignItems:'center',paddingTop:10,paddingBottom:10,borderRight:'1px solid rgba(255,255,255,.06)'}},
    ce('div',{style:{width:32,height:32,borderRadius:8,background:GB,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:900,color:'#fff',marginBottom:14,boxShadow:'0 2px 8px rgba(27,88,227,.4)'}},'G'),
    ce('div',{style:{display:'flex',flexDirection:'column',gap:3,flex:1,alignItems:'center',width:'100%'}},
      ITEMS.map(function(item){
        var isA=nav===item.id;
        var navHref={'home':null,'inbox':null,'outbound':'gallabox-outbound.html','contacts':null,'grid':'gallabox-web-empty.html','sett':null};
var navNewTab={'outbound':true};
        var tipLabels={'home':'Home','inbox':'Conversations','outbound':'Outbound','contacts':'Contacts','grid':'Web Agents','sett':'Settings'};
        return ce('button',{key:item.id,title:tipLabels[item.id]||item.id,
          onClick:function(){
            if(navHref[item.id]){if(navNewTab&&navNewTab[item.id])window.open(navHref[item.id],'_blank');else window.location.href=navHref[item.id];}
            else setNav(item.id);
          },style:{width:38,height:38,borderRadius:8,border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',background:isA?'rgba(27,88,227,.25)':'transparent',transition:'background .13s'},
          onMouseEnter:function(e){if(!isA)e.currentTarget.style.background='rgba(255,255,255,.07)';},
          onMouseLeave:function(e){if(!isA)e.currentTarget.style.background='transparent';}},
          ce(item.I,{sz:18,cl:isA?'#93C5FD':'#64748B'}));
      })),
    ce('div',{style:{width:30,height:30,borderRadius:'50%',background:'#1E3A5F',border:'2px solid #334155',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'#7CB9E8',cursor:'pointer',marginTop:6}},'DG'));
}

// DEMO BAR
function DemoBar(p){
  var status=p.status,onEnd=p.onEnd,onReset=p.onReset,onNewSess=p.onNewSess;
  var isLive=status==='Live';
  var isResolved=status==='Resolved';
  return ce('div',{style:{height:34,background:'#0F172A',display:'flex',alignItems:'center',
    padding:'0 14px',gap:10,flexShrink:0,borderBottom:'1px solid rgba(255,255,255,.05)',
    overflowX:'auto'}},
    ce('span',{style:{fontSize:9.5,color:'#475569',fontWeight:800,letterSpacing:.8,flexShrink:0}},'DEMO'),
    ce('div',{style:{width:1,height:12,background:'#1E293B',flexShrink:0}}),
    // Step 1 — always shown as completed/active
    ce('div',{style:{display:'flex',alignItems:'center',gap:4,flexShrink:0}},
      ce('div',{style:{width:14,height:14,borderRadius:'50%',
        border:'1.5px solid '+(isLive?TEAL:'#334155'),
        background:isLive?'transparent':'#334155',
        display:'flex',alignItems:'center',justifyContent:'center'}}),
      ce('span',{style:{fontSize:10.5,color:isLive?TEAL:'#475569',fontWeight:isLive?700:500}},'conversation.create')),
    ce('div',{style:{width:16,height:1,background:'#1E293B',flexShrink:0}}),
    // Step 2 — fire resolve
    ce('div',{style:{display:'flex',alignItems:'center',gap:4,flexShrink:0}},
      ce('div',{style:{width:14,height:14,borderRadius:'50%',
        border:'1.5px solid '+(isResolved?GB:'#334155'),
        background:isResolved?GB:'transparent',
        display:'flex',alignItems:'center',justifyContent:'center'}}),
      ce('span',{style:{fontSize:10.5,color:isResolved?GB:'#475569',fontWeight:isResolved?700:500}},'conversation.resolve')),
    // Action buttons
    isLive?ce('button',{onClick:onEnd,style:{padding:'3px 10px',borderRadius:5,
      border:'1px solid rgba(245,158,11,.4)',background:'rgba(245,158,11,.1)',
      cursor:'pointer',fontFamily:'inherit',fontSize:10.5,fontWeight:600,
      color:'#F59E0B',transition:'all .13s',flexShrink:0,marginLeft:4}},
      'Simulate resolve \u2192 inject'):null,
    !isLive?ce('button',{onClick:onNewSess,style:{padding:'3px 10px',borderRadius:5,
      border:'1px solid rgba(2,132,199,.3)',background:'rgba(2,132,199,.08)',
      cursor:'pointer',fontFamily:'inherit',fontSize:10.5,fontWeight:600,
      color:TEAL,transition:'all .13s',flexShrink:0,marginLeft:4}},
      '+ New web session'):null,
    !isLive?ce('button',{onClick:onReset,style:{padding:'3px 10px',borderRadius:5,
      border:'1px solid #1E293B',background:'rgba(255,255,255,.04)',
      cursor:'pointer',fontFamily:'inherit',fontSize:10.5,fontWeight:600,
      color:'#475569',transition:'all .13s',flexShrink:0}},
      'Reset'):null,
    ce('div',{style:{flex:1}}),
    // Backlog pill
    ce('div',{style:{display:'flex',alignItems:'center',gap:5,
      padding:'2px 8px',background:'rgba(124,58,237,.12)',borderRadius:4,
      border:'1px solid rgba(124,58,237,.2)',flexShrink:0}},
      ce('span',{style:{fontSize:9,fontWeight:800,color:'#A78BFA',letterSpacing:.4}},'\u2611 BACKLOG'),
      ce('span',{style:{fontSize:9.5,color:'#6D4ACE'}},
        'Web as log \u00b7 no new convo \u00b7 editor settings \u2192 inject-to channel')));
}

// APP ROOT
function App(){
  var ss=useState(SESSIONS_INIT),sessions=ss[0],setSessions=ss[1];
  var os=useState(false),overlayOpen=os[0],setOverlayOpen=os[1];
  var oss=useState(null),overlaySess=oss[0],setOverlaySess=oss[1];
  var cs=useState(1),activeConv=cs[0],setActiveConv=cs[1];
  var bs=useState(true),banner=bs[0],setBanner=bs[1];
  var vp=useState(null),vcPanel=vp[0],setVcPanel=vp[1];
  function endSession(){setSessions(function(prev){return [SESSION_DONE].concat(prev.slice(1));});setOverlayOpen(false);}
  function resetSession(){setSessions(SESSIONS_INIT);setOverlayOpen(false);}
  function newSession(){setSessions(function(prev){return [SESSION_NEW_LIVE].concat(prev);});}
  function handleView(session){setOverlaySess(session);setOverlayOpen(true);}
  return ce('div',{style:{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}},
    banner?ce('div',{style:{background:'#FFFBEB',height:32,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',gap:10,fontSize:11.5,color:'#92400E',position:'relative'}},
      ce('span',null,'Upgrade your Shopify integration to the latest version to ensure seamless functionality, if not done already.'),
      ce('button',{style:{padding:'2px 10px',background:'#1E293B',color:'#fff',border:'none',borderRadius:5,cursor:'pointer',fontFamily:'inherit',fontSize:11,fontWeight:700}},'Upgrade'),
      ce('button',{onClick:function(){setBanner(false);},style:{position:'absolute',right:12,background:'none',border:'none',cursor:'pointer',color:'#B45309',fontSize:15,lineHeight:1}},'x')):null,
    ce(DemoBar,{status:sessions[0].status,onEnd:endSession,onReset:resetSession,onNewSess:newSession}),
    ce('div',{style:{display:'flex',flex:1,overflow:'hidden'}},
      ce(LeftSidebar,null),
      ce(ConvList,{activeId:activeConv,onSelect:setActiveConv,vcPanel:vcPanel,setVcPanel:setVcPanel}),
      vcPanel?ce(ViewContactPanel,{contact:vcPanel,onClose:function(){setVcPanel(null);}}):null,
      ce(ChatArea,{sessions:sessions,onView:handleView,compact:!!vcPanel}),
      ce(RightPanel,{sessions:sessions,overlayOpen:overlayOpen,overlaySess:overlaySess,onClose:function(){setOverlayOpen(false);}})));
}
ReactDOM.createRoot(document.getElementById('root')).render(ce(App,null));

</script>
