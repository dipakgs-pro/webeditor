<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Campaign Builder — Gallabox</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_gb.css">
<style>
:root{
  --blue:#0057FF;--blue-d:#0040CC;
  --blue-s:#EEF4FF;--blue-g:#F5F8FF;
  --navy:#0B1628;--navy-m:#1C2D4A;
  --white:#fff;--off:#F7F9FC;
  --border:#E4EAF4;--border-d:#C8D4E8;
  --text:#1C2D4A;--muted:#6B7FA8;
  --green:#00C566;--green-s:#E6FAF1;
  --amber:#F59E0B;--amber-s:#FEF3C7;
  --red:#EF4444;--red-s:#FEE2E2;
  --purple:#7C3AED;--purple-s:#EDE9FE;
  --r:12px;--r-sm:8px;
  --sh:0 2px 12px rgba(0,57,255,.08);
  --sh-md:0 8px 32px rgba(0,57,255,.12);
}
:root{
  --blue:var(--gb);--blue-d:var(--gb-d);--blue-s:var(--gb-s);--blue-b:var(--gb-b);
  --green:var(--ok);--green-s:var(--ok-s);--amber:var(--warn);--amber-s:var(--warn-s);
  --red:var(--err);--red-s:var(--err-s);--navy:var(--n900);--navy-m:var(--n700);
  --text:var(--ink);--muted:var(--n500);--border-d:var(--n300);
  --font-body:var(--fb);--font-head:var(--fh);--r:10px;--r-sm:8px;
  --sh-m:0 8px 32px rgba(15,23,42,.14);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--off);color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden}
button,input,select,textarea{font-family:'DM Sans',sans-serif;cursor:pointer}

/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}
#gb-sb{flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.screen{display:none;flex-direction:column;height:100vh;overflow:hidden}
.screen.on{display:flex}

/* TOPBAR */
.tb{height:52px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:8px;flex-shrink:0;z-index:10}
.tb-title{font-family:'Sora',sans-serif;font-size:14px;font-weight:700;color:var(--navy)}
.tb-sep{width:1px;height:18px;background:var(--border);margin:0 2px;flex-shrink:0}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:7px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r-sm);font-size:12.5px;font-weight:600;border:1.5px solid transparent;transition:all .14s;cursor:pointer;font-family:var(--fb)}
.btn-p{background:linear-gradient(180deg,#2E6FFB 0%,var(--blue) 100%);color:#fff;border-color:transparent;box-shadow:0 1px 0 rgba(255,255,255,.18) inset,0 1px 2px rgba(20,65,196,.32),0 4px 12px rgba(27,88,227,.22)}
.btn-p:hover{background:linear-gradient(180deg,var(--blue) 0%,var(--blue-d) 100%)}
.btn-s{background:var(--white);color:var(--navy-m);border-color:var(--border-d)}
.btn-s:hover{background:var(--off)}
.btn-g{background:transparent;color:var(--muted);border-color:transparent}
.btn-g:hover{background:var(--off);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn:disabled{opacity:.35;pointer-events:none}
#publish-btn{background:linear-gradient(180deg,#22c55e 0%,var(--ok) 100%);color:#fff;border-color:transparent;box-shadow:0 1px 0 rgba(255,255,255,.2) inset,0 1px 2px rgba(20,130,60,.3),0 4px 12px rgba(22,163,74,.22)}
#publish-btn:hover{background:linear-gradient(180deg,var(--ok) 0%,#15803d 100%)}

/* STATUS */
.status{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.status.live{background:#DCFCE7;color:#16A34A}.status.draft{background:var(--off);color:var(--muted);border:1px solid var(--border)}.status.paused{background:#FEF3C7;color:#92400E}
.cdot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700}
.badge-b{background:var(--blue-s);color:var(--blue)}

/* HEALTH STRIP */
.health-strip{height:36px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;flex-shrink:0}
.hs-item{display:flex;align-items:center;gap:5px;padding:0 12px}
.hs-item:first-child{padding-left:0}
.hs-key{font-size:11px;color:var(--n500);font-weight:500}
.hs-val{font-size:12.5px;font-weight:800;color:var(--n900);font-family:var(--fh)}
.hs-val.ok{color:var(--ok)}.hs-val.blue{color:var(--gb)}.hs-val.purple{color:var(--purple)}
.hs-sep{width:1px;height:16px;background:var(--border);flex-shrink:0}

/* BUILDER SHELL — 2 panel layout */
.builder-shell{display:flex;flex:1;overflow:hidden;min-height:0}

/* LEFT: STEP LIST */
.steplist{width:272px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.steplist-hd{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--off)}
.steplist-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--n500)}
.steplist-body{flex:1;overflow-y:auto;padding:8px 8px 20px}

/* Step row */
.step{display:flex;align-items:flex-start;gap:9px;padding:8px 7px;border-radius:9px;cursor:pointer;transition:all .13s;border:1.5px solid transparent}
.step:hover{background:var(--off)}
.step.on{background:var(--gb-s);border-color:var(--gb-b)}
.step-bullet{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;border:1.5px solid;margin-top:1px;line-height:1}
.step-bullet.entry{background:var(--n900);color:#fff;border-color:var(--n900)}
.step-bullet.message{background:var(--gb-s);color:var(--gb);border-color:var(--gb-b)}
.step-bullet.condition{background:var(--warn-s);color:var(--warn);border-color:#FED7AA}
.step-bullet.wait{background:var(--n50);color:var(--n500);border-color:var(--n200)}
.step-bullet.action{background:var(--purple-s);color:var(--purple);border-color:#DDD6FE}
.step-bullet.experiment{background:#F0F9FF;color:#0284C7;border-color:#BAE6FD}
.step-bullet.exit{background:var(--err-s);color:var(--err);border-color:#FECACA}
.step-bullet.dropped{background:#FFF7ED;color:#92400E;border-color:#FED7AA}
.step-info{flex:1;min-width:0}
.step-name{font-size:12.5px;font-weight:600;color:var(--n900);line-height:1.35}
.step.on .step-name{color:var(--gb-d)}
.step-meta{font-size:11px;color:var(--n500);margin-top:2px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.step-del{opacity:0;background:none;border:none;color:var(--n400);cursor:pointer;font-size:15px;padding:2px 4px;border-radius:4px;line-height:1;flex-shrink:0;transition:all .12s;margin-top:2px}
.step:hover .step-del{opacity:1}
.step-del:hover{color:var(--err);background:var(--err-s)}

/* Connectors */
.step-conn{display:flex;padding-left:20px;margin:1px 0}
.step-conn-line{width:1.5px;height:10px;background:var(--n200);border-radius:1px}

/* Branch lanes */
.step-branch-wrap{margin-left:12px;border-left:1.5px dashed var(--n200);padding-left:9px;margin-top:2px;margin-bottom:2px}
.step-branch-lbl{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10.5px;font-weight:700;margin:3px 0 4px}
.step-branch-lbl.yes{background:var(--ok-s);color:var(--ok)}
.step-branch-lbl.no{background:var(--err-s);color:var(--err)}

/* Add step button */
.step-add-row{display:flex;flex-direction:column;align-items:flex-start;padding-left:20px}
.step-add-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;border:1.5px dashed var(--n300);background:transparent;color:var(--n500);font-size:11.5px;font-weight:600;cursor:pointer;transition:all .14s;font-family:var(--fb);margin-top:2px}
.step-add-btn:hover{border-color:var(--gb);color:var(--gb);background:var(--gb-s)}

/* CENTER + RIGHT: editor area */
.editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:#F0F3F8}

/* Editor head (tabs bar) */
.editor-head{height:48px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:8px;flex-shrink:0}
.editor-crumb{font-size:12.5px;color:var(--n500);display:flex;align-items:center;gap:5px}
.editor-crumb b{color:var(--n900);font-weight:700}
.editor-tabs{display:flex;gap:2px;margin-left:auto}
.editor-tab{padding:5px 11px;border-radius:6px;border:none;background:transparent;font-size:12px;font-weight:600;color:var(--n500);cursor:pointer;transition:all .13s;font-family:var(--fb)}
.editor-tab:hover{background:var(--n100);color:var(--n700)}
.editor-tab.on{background:var(--gb-s);color:var(--gb)}
.editor-tab-empty{display:none}

/* Stage: 2-col config + preview */
.editor-stage{flex:1;overflow:hidden;display:grid;grid-template-columns:1fr 328px;min-height:0}
.stage-config{overflow-y:auto;padding:18px 20px;display:flex;flex-direction:column;gap:10px}
.stage-preview{border-left:1px solid var(--border);background:#F7F9FC;overflow-y:auto;display:flex;flex-direction:column}
.stage-preview-inner{display:flex;flex-direction:column;align-items:center;gap:12px;padding:16px 14px;position:sticky;top:0}

/* Editor empty state (no node selected) */
.editor-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:56px 24px;text-align:center;color:var(--n500);gap:14px}
.editor-empty-icon{width:56px;height:56px;border-radius:14px;background:var(--white);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:24px;opacity:.5}
.editor-empty-text{font-size:13px;line-height:1.65;max-width:220px}

/* Editor section (white card blocks inside stage-config) */
.editor-section{background:var(--white);border:1px solid var(--border);border-radius:11px;overflow:hidden;box-shadow:0 1px 3px rgba(15,23,42,.05)}
.editor-section-head{padding:11px 14px;background:linear-gradient(180deg,#fff 0%,#FBFBFE 100%);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.editor-section-title{font-size:12px;font-weight:800;color:var(--n900);display:flex;align-items:center;gap:6px}
.editor-section-body{padding:14px}

/* Helper hints */
.helper{display:flex;align-items:flex-start;gap:7px;padding:9px 11px;background:linear-gradient(180deg,var(--gb-s) 0%,rgba(239,244,255,.4) 100%);border-radius:8px;font-size:11.5px;color:var(--n700);line-height:1.5;border:1px solid rgba(27,88,227,.1)}
.helper-warn{background:linear-gradient(180deg,var(--warn-s) 0%,rgba(255,251,235,.4) 100%);border-color:rgba(217,119,6,.15)}
.helper-icon{font-size:13px;flex-shrink:0;margin-top:1px}

/* Progressive disclosure */
.adv{border-top:1px dashed var(--border);margin-top:12px}
.adv-trigger{display:inline-flex;align-items:center;gap:5px;padding:7px 0 3px;background:transparent;border:none;color:var(--n500);font-size:12px;font-weight:600;cursor:pointer;transition:color .13s;font-family:var(--fb)}
.adv-trigger:hover{color:var(--gb)}
.adv-trigger .chev{display:inline-block;transition:transform .18s}
.adv.open .adv-trigger .chev{transform:rotate(90deg)}
.adv-body{max-height:0;overflow:hidden;transition:max-height .22s ease,opacity .18s;opacity:0}
.adv.open .adv-body{max-height:900px;opacity:1;padding-top:8px}

/* Var pill */
.var-pill{display:inline-flex;align-items:center;gap:3px;padding:1px 7px;background:var(--purple-s);color:var(--purple);border-radius:4px;font-family:monospace;font-size:11.5px;font-weight:600}

/* Vchip (validation) */
.vchip{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:999px;font-size:10.5px;font-weight:700}
.vchip.ok{background:var(--ok-s);color:var(--ok)}
.vchip.warn{background:var(--warn-s);color:var(--warn)}
.vchip.err{background:var(--err-s);color:var(--err)}
.vchip.mcp{background:#0F1117;color:#fff}

/* Entry type source cards */
.entry-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.entry-type-card{padding:11px 12px;border-radius:9px;border:1.5px solid var(--border);cursor:pointer;transition:all .13s;text-align:center}
.entry-type-card:hover{border-color:var(--gb-b);background:var(--gb-s)}
.entry-type-card.on{border-color:var(--gb);background:var(--gb-s)}
.entry-type-card-ic{font-size:18px;margin-bottom:4px}
.entry-type-card-lbl{font-size:12px;font-weight:700;color:var(--n900)}
.entry-type-card-sub{font-size:10.5px;color:var(--n500);margin-top:2px}

/* Enrollment condition builder */
.econd-builder{border:1.5px solid var(--border);border-radius:9px;overflow:hidden}
.econd-row{display:flex;align-items:center;gap:5px;padding:8px 10px;border-bottom:1px solid var(--off);background:var(--white)}
.econd-row:last-child{border-bottom:none}
.econd-logic{display:inline-flex;padding:2px;background:var(--n100);border-radius:6px;gap:2px;flex-shrink:0}
.econd-logic button{padding:2px 9px;border:none;background:transparent;border-radius:4px;font-size:11px;font-weight:700;color:var(--n500);cursor:pointer;font-family:var(--fb)}
.econd-logic button.on{background:#fff;color:var(--n900);box-shadow:0 1px 2px rgba(15,23,42,.06)}
.econd-add{width:100%;padding:8px;background:var(--off);border:none;border-top:1px solid var(--border);font-size:12px;color:var(--gb);font-weight:600;cursor:pointer;font-family:var(--fb);transition:background .12s}
.econd-add:hover{background:var(--gb-s)}
.drop-toggle{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.drop-opt{padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;text-align:center;transition:all .13s}
.drop-opt.on{border-color:var(--err);background:var(--err-s)}
.drop-opt-lbl{font-size:12px;font-weight:700;color:var(--n900)}
.drop-opt-sub{font-size:10.5px;color:var(--n500);margin-top:2px}

/* Node stat strip inside editor */
.node-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.node-stat{background:var(--off);border-radius:8px;padding:9px 8px;text-align:center;border:1px solid var(--border)}
.node-stat-val{font-family:var(--fh);font-size:15px;font-weight:800}
.node-stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}

/* Preview panel (stage-preview contents) */
.preview-hd{padding:9px 14px;border-bottom:1px solid var(--border);background:var(--white);display:flex;align-items:center;gap:7px;flex-shrink:0;position:sticky;top:0;z-index:2}
.preview-hd-title{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--n500)}
.preview-empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 16px;text-align:center;gap:10px;color:var(--n400)}
.preview-empty-icon{font-size:28px;opacity:.4}
.preview-empty-text{font-size:12px;line-height:1.6;max-width:180px}

/* FORMS */
.fg{margin-bottom:14px}
.fl{font-size:11.5px;font-weight:700;color:var(--navy-m);margin-bottom:5px;display:flex;align-items:center;gap:5px}
.fi{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;color:var(--ink);outline:none;transition:border-color .14s,box-shadow .14s;background:var(--white)}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(27,88,227,.08)}
.fs{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;color:var(--ink);outline:none;background:var(--white);transition:border-color .14s}
.fs:focus{border-color:var(--blue)}
.fhint{font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.5}
.tog{width:38px;height:21px;border-radius:20px;background:var(--n300);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;border:none}
.tog.on{background:var(--blue)}
.tok{position:absolute;top:2.5px;left:2.5px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:left .18s;pointer-events:none}
.tog.on .tok{left:20px}
.ins-sec{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--n400);margin:18px 0 9px;padding-bottom:5px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.ins-sec:first-child{margin-top:4px}
.docs-help{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--off);border:1.5px solid var(--border-d);color:var(--muted);font-size:11px;font-weight:800;text-decoration:none;flex-shrink:0;transition:all .14s}
.docs-help:hover{background:var(--blue-s);border-color:var(--blue);color:var(--blue)}

/* Segment/OR chips */
.seg-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;background:var(--gb-s);border:1.5px solid var(--gb-b);color:var(--gb);margin:2px}
.seg-or{font-size:10px;font-weight:800;text-transform:uppercase;color:var(--n400);padding:2px 5px}
.or-src{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.or-src::before,.or-src::after{content:'';flex:1;height:1px;background:var(--border)}
.src-section{border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:4px}
.src-hd{font-size:11px;font-weight:800;color:var(--navy-m);margin-bottom:7px;display:flex;align-items:center;gap:5px}

/* Condition editor */
.cond-row{display:flex;align-items:center;gap:5px;padding:7px 10px;border-bottom:1px solid var(--off)}
.cond-row:last-child{border-bottom:none}
.cr-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;padding:0 3px;flex-shrink:0}
.cr-del:hover{color:var(--red)}

/* A/B test */
.ab-arms{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.ab-arm{border-radius:9px;padding:10px 12px}
.ab-arm-a{background:#EDE9FE;border:1.5px solid #DDD6FE}.ab-arm-b{background:#F3E8FF;border:1.5px solid #E9D5FF}
.ab-arm-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.ab-arm-lbl-a{color:#7C3AED}.ab-arm-lbl-b{color:#9333EA}
.ab-slider-wrap{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.ab-slider{flex:1;height:4px;accent-color:var(--purple);cursor:pointer}
.ab-slider-val{font-size:13px;font-weight:800;color:#7C3AED;min-width:32px;text-align:right}
.ab-arm-hint{font-size:11.5px;color:var(--muted);padding:7px 10px;background:var(--off);border-radius:7px;line-height:1.5;margin-bottom:10px}
.ab-warn{font-size:11.5px;color:#92400E;padding:7px 10px;background:var(--amber-s);border-radius:7px;line-height:1.5;margin-top:4px;margin-bottom:10px}
.ab-sel-mode{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.ab-sel-opt{padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;text-align:center;transition:all .13s}
.ab-sel-opt.on{border-color:#7C3AED;background:#F3E8FF}
.ab-sel-opt-lbl{font-size:12px;font-weight:700;color:var(--navy)}
.ab-sel-opt-sub{font-size:10.5px;color:var(--muted);margin-top:2px}

/* preview-body (inside stage-preview-inner) */
.preview-body{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%}

/* WA Phone mockup */
.wa-phone-frame{width:248px;background:linear-gradient(160deg,#075E54 0%,#128C7E 100%);border-radius:20px;padding:10px;padding-top:0;box-shadow:0 8px 28px rgba(7,94,84,.28),0 2px 6px rgba(0,0,0,.12);flex-shrink:0}
.wa-phone-bar{height:46px;border-radius:20px 20px 0 0;display:flex;align-items:center;padding:0 12px;gap:8px;background:rgba(0,0,0,.14)}
.wa-avatar{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;flex-shrink:0}

/* Variable map card */
.var-map-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 14px;width:248px}
.var-map-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--n400);margin-bottom:8px}
.var-map-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--off);font-size:12px}
.var-map-row:last-child{border-bottom:none}
.var-map-key{color:var(--purple);font-weight:700;font-family:monospace;font-size:11px}
.var-map-val{color:var(--n700);font-size:11.5px;font-weight:500}
.preview-ab-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;padding:3px 10px;border-radius:20px;align-self:flex-start}
.preview-ab-lbl.a{background:#EDE9FE;color:#7C3AED}.preview-ab-lbl.b{background:#F3E8FF;color:#9333EA}

/* Node picker popup */
.pick-pop{position:fixed;z-index:600;background:var(--white);border:1.5px solid var(--border);border-radius:12px;box-shadow:var(--sh-m);width:248px;overflow:hidden;animation:popIn .13s ease}
.pick-sec-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--n400);padding:8px 12px 3px}
.pick-sep{height:1px;background:var(--border);margin:3px 0}
.pick-item{display:flex;align-items:center;gap:10px;padding:8px 12px;cursor:pointer;transition:background .1s}
.pick-item:hover{background:var(--n50)}
.pick-item.pick-disabled{opacity:.35;pointer-events:none}
.pick-ic{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.pick-name{font-size:13px;font-weight:600;color:var(--navy)}
.pick-desc{font-size:11px;color:var(--muted);margin-top:1px}

/* Toast */
.toast-el{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;color:#fff;box-shadow:var(--sh-m);z-index:700;pointer-events:none;animation:toastIn .2s ease;background:var(--n900)}
.toast-el.t-ok{background:var(--ok)}.toast-el.t-err{background:var(--err)}

@keyframes popIn{from{opacity:0;transform:scale(.93) translateY(-6px)}to{opacity:1;transform:none}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

<script>
'use strict';

/* ── ROUTING ── */
function urlParam(k){return new URLSearchParams(window.location.search).get(k);}
var pageId=parseInt(urlParam('id'))||1;
activeCampId=pageId;
CAMPS=loadC();
var currentFlow=loadFlow(activeCampId);
var selectedNodeId=null;

function goHome(){window.location.href='gallabox-outbound.html';}
function goAnalytics(id){window.location.href='outbound-analytics.html?id='+(id||activeCampId);}

/* ── GROUP COLOR map (hex — avoids dual-:root resolution issues) ── */

  entry:'#1B58E3',message:'#16A34A',condition:'#D97706',
  wait:'#94A3B8',action:'#7C3AED',exit:'#EF4444',experiment:'#0284C7'
};

/* ── TEMPLATE PREVIEW BODIES ── */

  'diwali_thankyou_v1':{body:'Thank you *{{1}}*! 🙏\n\nYour Diwali order is confirmed. We\'ll ship within 2 business days.',vars:['first_name'],buttons:[]},
  'webinar_welcome_v1':{body:'Hi *{{1}}*! 🎓\n\nThank you for registering!\n\n📅 Your webinar is on *{{2}}* at 3:00 PM.\n\nWe\'ll send the link 15 mins before.',vars:['first_name','Nov 28'],buttons:['Add to Calendar']},

  'reactivation_30d_v1':{body:'We miss you *{{1}}*! 👋\n\nIt\'s been 30 days. Come back — we have something special.',vars:['first_name'],buttons:['See What\'s New']},
  'cart_abandon_v1':{body:'Hi *{{1}}*, you left something behind! 🛒\n\nYour cart is waiting. Complete your purchase.',vars:['first_name'],buttons:['Complete Purchase','View Cart']},
  'payment_reminder_v1':{body:'Hi *{{1}}*, friendly reminder 📋\n\nYour payment of *{{2}}* is due on *{{3}}*.',vars:['first_name','amount','due_date'],buttons:['Pay Now','View Invoice']},
};
var TPREV_DEFAULT={body:'Hi *{{1}}*,\n\nHere\'s a message from *{{2}}*.\n\nReply to connect with our team.',vars:['first_name','company_name'],buttons:['Reply Now']};
var TSAMPLE={first_name:'John',last_name:'Smith','25%':'25%','20%':'20%',amount:'₹1,200',due_date:'Dec 1',webinar_date:'Nov 28','gallabox.io/rec':'gallabox.io/rec/abc',wishlist:'wishlist','30%':'30%'};

/* ── HEADER ── */
function initHeader(){
  var c=CAMPS.find(function(x){return x.id===activeCampId;})||{name:'Campaign',obj:'engagement',type:'broadcast',status:'draft'};
  nt('canvas-title',c.name);
  var meta=document.getElementById('canvas-meta');
  if(meta){
    var stCls=c.status==='active'?'live':c.status==='paused'?'paused':'draft';
    meta.innerHTML='<span class="badge badge-b" style="font-size:11px">'+esc(OBJ_L[c.obj]||c.obj)+'</span>'
      +'<span style="padding:3px 10px;border-radius:20px;font-size:10.5px;font-weight:700;background:var(--off);color:var(--muted);border:1px solid var(--border)">'
      +(c.type==='sequence'?'&#128256; Sequence':'&#128226; Broadcast')+'</span>'
      +'<span class="status '+stCls+'"><span class="cdot"></span>'+(STATUS_L[c.status]||c.status)+'</span>';
  }
  var d=ANA[activeCampId];
  if(d){
    nt('hs-enrolled',fmt(d.enrolled||0));nt('hs-sent',fmt(d.sent||0));
    nt('hs-delivered',fmt(d.delivered||0));nt('hs-read',fmt(d.read||0));nt('hs-replied',fmt(d.replied||0));
  }
}

/* ── PERSIST ── */
function persistFlow(){
  saveFlow(activeCampId,currentFlow);
  nt('step-count-label',currentFlow.length+' step'+(currentFlow.length!==1?'s':''));
}

/* ── TOAST ── */
function toast(msg,type){
  var t=document.createElement('div');t.className='toast-el'+(type?' t-'+type:'');t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},320);},2200);
}

/* ── SAVE / PUBLISH ── */
function saveCampaign(){
  persistFlow();var c=CAMPS.find(function(x){return x.id===activeCampId;});if(c)saveC(CAMPS);toast('Draft saved ✓','ok');
}
function publishCampaign(){
  var entry=currentFlow.find(function(n){return NM[n.type]&&NM[n.type].group==='entry';});
  if(!entry){toast('Add an entry node first','err');return;}
  var abNode=currentFlow.find(function(n){return n.type==='ab-test';});
  if(abNode){if(!abNode.cfg.template_a||!abNode.cfg.template_b){toast('A/B Test: select both templates','err');return;}if(abNode.cfg.template_a===abNode.cfg.template_b){toast('A/B Test: templates must be different','err');return;}}
  var msg=currentFlow.find(function(n){return n.type==='send-wa'||n.type==='ab-test';});
  if(!msg){toast('Add a WhatsApp message or A/B Test first','err');return;}
  var c=CAMPS.find(function(x){return x.id===activeCampId;});if(!c)return;
  if(!confirm('Publish "'+c.name+'"?\n\nThis activates the campaign.'))return;
  c.status='active';persistFlow();saveC(CAMPS);initHeader();toast('Campaign published ✓','ok');
}

/* ══════════════════════════════════════════
   STEP LIST
══════════════════════════════════════════ */
function renderStepList(){
  var el=document.getElementById('steplist-body');if(!el)return;
  if(!currentFlow.length){
    el.innerHTML='<div style="padding:24px 10px;text-align:center"><div style="font-size:12.5px;color:var(--n500);margin-bottom:14px;line-height:1.6">Empty flow. Add your first step.</div>'+stepAddBtn(null,'main')+'</div>';
    nt('step-count-label','0 steps');return;
  }
  var root=currentFlow.find(function(n){return !n.parentId;});
  if(!root){el.innerHTML=stepAddBtn(null,'main');return;}
  el.innerHTML=stepSubtree(root.id);
  nt('step-count-label',currentFlow.length+' step'+(currentFlow.length!==1?'s':''));
}

function stepSubtree(nid){
  var n=currentFlow.find(function(x){return x.id===nid;});if(!n)return '';
  var m=NM[n.type]||{label:n.type,ic:'&#9675;',group:'action'};
  var isSel=(selectedNodeId===n.id);
  var h='';
  if(n.parentId) h+='<div class="step-conn"><div class="step-conn-line"></div></div>';
  h+='<div class="step'+(isSel?' on':'')+'" id="step-'+n.id+'" onclick="selNode(\''+n.id+'\')">';
  var bulletCls=n.type==='exit-dropped'?'dropped':esc(m.group);
  h+='<div class="step-bullet '+bulletCls+'">'+m.ic+'</div>';
  h+='<div class="step-info"><div class="step-name">'+esc(m.label)+'</div>';
  var meta=stepMeta(n);if(meta)h+='<div class="step-meta">'+esc(meta)+'</div>';
  h+='</div>';
  if(m.group!=='exit') h+='<button class="step-del" onclick="event.stopPropagation();deleteNode(\''+n.id+'\')" title="Remove">\xd7</button>';
  h+='</div>';
  if(n.type==='condition'){
    var yC=currentFlow.find(function(x){return x.parentId===n.id&&x.branch==='yes';});
    var nC=currentFlow.find(function(x){return x.parentId===n.id&&x.branch==='no';});
    h+='<div class="step-branch-wrap"><div class="step-conn"><div class="step-conn-line"></div></div><div class="step-branch-lbl yes">✓ YES path</div>';
    h+=(yC?stepSubtree(yC.id):stepAddBtn(n.id,'yes'))+'</div>';
    h+='<div class="step-branch-wrap"><div class="step-conn"><div class="step-conn-line"></div></div><div class="step-branch-lbl no">✗ NO path</div>';
    h+=(nC?stepSubtree(nC.id):stepAddBtn(n.id,'no'))+'</div>';
  } else if(m.group!=='exit'){
    var child=currentFlow.find(function(x){return x.parentId===n.id&&!x.branch;});
    h+=(child?stepSubtree(child.id):stepAddBtn(n.id,'main'));
  }
  return h;
}

function stepMeta(n){
  var cfg=n.cfg||{};
  if(n.type==='segment-enroll'){var srcT={segment:'Segment',csv:'CSV Upload',api:'API Trigger',webhook:'Webhook',web:'Web Visitor'};return srcT[cfg.srcType||'segment']+(cfg.segments&&cfg.segments.length?' · '+cfg.segments.length+' segs':'');}
  if(n.type==='send-wa')return cfg.template?cfg.template.replace(/_/g,' '):'No template';
  if(n.type==='ab-test')return (cfg.template_a&&cfg.template_b)?(cfg.test_pct||10)+'% test':'Configure both variants';
  if(n.type==='condition'){var cc=cfg.conditions||[];return cc.length?cc.length+' condition'+(cc.length>1?'s':''):'Add conditions';}
  if(n.type==='wait-delay')return (cfg.amount||24)+' '+(cfg.unit||'hours');
  if(n.type==='api-trigger')return cfg.event?cfg.event:'API trigger';
  if(n.type==='web-returning')return cfg.page||'any page';
  if(n.type==='update-stage')return cfg.stage?cfg.stage:'Set stage';
  if(n.type==='assign-inbox')return cfg.inbox||'Select inbox';
  if(n.type==='assign-team')return cfg.team||'Select team';
  if(n.type==='add-success-seg'||n.type==='add-cold-seg')return cfg.segment||'Segment name';
  if(n.type==='tag-contact')return (cfg.add?'+'+cfg.add:'')+(cfg.remove?' -'+cfg.remove:'')||'Set tags';
  if(n.type==='update-field')return cfg.field?cfg.field+'='+cfg.value:'Set field';
  if(n.type.startsWith('exit-'))return cfg.label||(n.type==='exit-dropped'?'Dropped':n.type.replace('exit-',''));
  return '';
}

function stepAddBtn(pid,branch){
  return '<div class="step-add-row"><div class="step-conn"><div class="step-conn-line"></div></div>'
    +'<button class="step-add-btn" onclick="showPickerAtBtn(event,\''+(pid||'')+'\',\''+branch+'\')">'
    +'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add step</button></div>';
}

/* ══════════════════════════════════════════
   EDITOR — 4-TAB SYSTEM
══════════════════════════════════════════ */
var currentTab='content';

function clearEditor(){
  document.getElementById('editor-head').style.display='none';
  document.getElementById('editor-empty-state').style.display='flex';
  document.getElementById('editor-stage').style.display='none';
  renderPreview(null);
}

function switchTab(tab){
  currentTab=tab;
  ['content','logic','schedule','audience'].forEach(function(t){
    var el=document.getElementById('tab-'+t);
    if(el)el.classList.toggle('on',t===tab);
  });
  var n=currentFlow.find(function(x){return x.id===selectedNodeId;});
  if(n)renderTabContent(n,tab);
}

function selNode(id){
  selectedNodeId=id;
  document.querySelectorAll('.step').forEach(function(x){x.classList.remove('on');});
  var sEl=document.getElementById('step-'+id);
  if(sEl){sEl.classList.add('on');sEl.scrollIntoView({block:'nearest'});}

function buildPhonePreview(tmpl){
  var pd=tmpl?(TPREV[tmpl.id]||TPREV_DEFAULT):null;
  var h='<div class="wa-phone-frame">';
  h+='<div class="wa-phone-bar"><div class="wa-avatar">&#127970;</div>';
  h+='<div style="flex:1"><div class="wa-contact-name">'+(tmpl?esc(tmpl.name):'No template')+'</div>';
  h+='<div class="wa-status">'+(tmpl?esc(tmpl.cat)+' template':'Select a template')+'</div></div></div>';
  h+='<div class="wa-screen">';
  if(!pd){
    h+='<div style="font-size:12px;color:#888;padding:20px 8px;text-align:center;opacity:.7">Select a template to preview</div>';
  } else {
    h+='<div class="wa-bubble">';
    if(tmpl&&tmpl.cat==='Marketing') h+='<div class="wa-bubble-header">&#127381; Special Offer</div>';
    var body=pd.body;
    /* render variables as styled chips */
    var idx=0;
    body=body.replace(/\{\{(\d+)\}\}/g,function(match,num){
      var i=parseInt(num)-1;
      var varName=(pd.vars&&pd.vars[i])||('var'+num);
      var sampleVal=TSAMPLE[varName]||varName;
      return '​__VAR_'+i+'__​';
    });
    /* escape for HTML */
    body=esc(body);
    /* restore vars as styled spans */
    (pd.vars||[]).forEach(function(v,i){
      var sampleVal=TSAMPLE[v]||v;
      body=body.replace('​__VAR_'+i+'__​','<span class="wa-var-tag">'+esc(sampleVal)+'</span>');
    });
    body=body.replace(/\n/g,'<br>');
    body=body.replace(/\*([^*<>]+)\*/g,'<strong>$1</strong>');
    h+='<div class="wa-bubble-body">'+body+'</div>';
    h+='<div class="wa-bubble-time">10:24 ✓✓</div>';
    h+='</div>';
    if(pd.buttons&&pd.buttons.length){
      h+='<div class="wa-btn-list">';
      pd.buttons.forEach(function(btn){h+='<div class="wa-btn">'+esc(btn)+'</div>';});
      h+='</div>';
    }
  }
  h+='</div></div>';
  return h;
}

function buildVarMap(tmplId){
  var pd=TPREV[tmplId];if(!pd||!pd.vars||!pd.vars.length)return '';
  var h='<div class="var-map-card"><div class="var-map-title">Variable mapping</div>';
  pd.vars.forEach(function(v,i){
    h+='<div class="var-map-row"><span class="var-map-key">{{' + (i+1) + '}}</span><span class="var-map-val">'+esc(TSAMPLE[v]||v)+'</span></div>';
  });
  h+='</div>';
  return h;
}

function showPickerAtBtn(e,pid,branch){

function showPicker(pid,branch,rect){
  closePicker();pickerCtx={pid:pid||null,branch:branch||'main'};
  var parentType=null;
  if(pid){var pn=currentFlow.find(function(n){return n.id===pid;});if(pn)parentType=pn.type;}
  var lookupKey=(branch==='yes'||branch==='no')?branch:(parentType||null);
  var allowed=(lookupKey?OPTS_AFTER[lookupKey]:null)||OPTS_AFTER['main']||Object.keys(NM);
  var html='';
  PICKER_SECS.forEach(function(sec,si){
    var items=sec.types.filter(function(t){return allowed.indexOf(t)!==-1;});
    if(!items.length)return;
    if(si>0)html+='<div class="pick-sep"></div>';
    html+='<div class="pick-sec-lbl">'+sec.title+'</div>';
    items.forEach(function(t){
      var m=NM[t]||{label:t,ic:'?',bg:'#F0F4FF',desc:''};
      html+='<div class="pick-item'+(m.disabled?' pick-disabled':'')+'" data-type="'+t+'">'
        +'<div class="pick-ic" style="background:'+m.bg+'">'+m.ic+'</div>'
        +'<div><div class="pick-name">'+m.label+(m.disabled?' <span style="font-size:10px;color:var(--n400)">(soon)</span>':'')+'</div>'
        +'<div class="pick-desc">'+m.desc+'</div></div></div>';
    });
  });
  var pop=document.createElement('div');pop.className='pick-pop';pop.id='pick-pop';pop.innerHTML=html;
  document.body.appendChild(pop);
  var pw=248,ph=Math.min(pop.scrollHeight+8,380),vw=window.innerWidth,vh=window.innerHeight,top,left;
  if(rect){top=rect.bottom+8;left=rect.left+rect.width/2-pw/2;}else{top=vh/2-160;left=vw/2-pw/2;}
  left=Math.max(8,Math.min(left,vw-pw-8));top=Math.max(8,Math.min(top,vh-ph-8));
  pop.style.top=top+'px';pop.style.left=left+'px';
  pop.addEventListener('click',function(e2){var item=e2.target.closest('[data-type]');if(item&&!item.classList.contains('pick-disabled'))addNode(item.dataset.type);});
  setTimeout(function(){document.addEventListener('click',onOutsideClick);},0);
}
function onOutsideClick(e){var pop=document.getElementById('pick-pop');if(pop&&!pop.contains(e.target))closePicker();}
function closePicker(){var pop=document.getElementById('pick-pop');if(pop&&pop.parentNode)pop.parentNode.removeChild(pop);document.removeEventListener('click',onOutsideClick);}

    'ab-test':{template_a:'',template_b:'',test_pct:10,metric:'replied',window_minutes:30,auto_winner:true,winner:null,status:'pending',objective:'reply_rate',control_group:false,control_pct:10},

    'exit-cold':{label:'Cold — no engagement'},'exit-failure':{label:'Bounced / opted out'},

  };

function deleteNode(id){
  var rem=[id],changed=true;
  while(changed){changed=false;currentFlow.forEach(function(n){if(rem.indexOf(n.parentId)!==-1&&rem.indexOf(n.id)===-1){rem.push(n.id);changed=true;}});}
  currentFlow=currentFlow.filter(function(n){return rem.indexOf(n.id)===-1;});
  if(selectedNodeId&&rem.indexOf(selectedNodeId)!==-1){selectedNodeId=null;clearEditor();}
  persistFlow();renderStepList();
}

    h+='<div class="editor-section"><div class="editor-section-head"><div class="editor-section-title">✏️ Update Field</div></div><div class="editor-section-body">';
    h+='<div class="fg"><div class="fl">Contact field</div><input class="fi" value="'+esc(cfg.field||'')+'" placeholder="e.g. lifecycle_stage" oninput="setCfg(\''+nid+'\',\'field\',this.value)"></div>';
    h+='<div class="fg"><div class="fl">Set value to</div><input class="fi" value="'+esc(cfg.value||'')+'" placeholder="New value" oninput="setCfg(\''+nid+'\',\'value\',this.value)"></div>';
    h+='</div></div>';
  }
  else if(n.type.startsWith('exit-')){
    var eInfo={
      'exit-success':{bg:'var(--ok-s)',c:'#166534',msg:'Contact converted or completed goal. Counted in success metrics.',ic:'✅'},
      'exit-cold':{bg:'var(--gb-s)',c:'#1e40af',msg:'No engagement — cold contact. Route to cold nurture campaigns.',ic:'❄️'},
      'exit-failure':{bg:'var(--err-s)',c:'#991b1b',msg:'Bounced or opted out. Automatically suppressed from future sends.',ic:'⛔'},
      'exit-dropped':{bg:'#FFF7ED',c:'#92400E',msg:'Contact did not meet enrollment conditions. Dropped before first message.',ic:'🚫'}
    };
    var ei=eInfo[n.type]||{bg:'var(--off)',c:'var(--muted)',msg:'',ic:'⭕'};
    h+='<div class="editor-section"><div class="editor-section-head"><div class="editor-section-title">'+ei.ic+' Exit Configuration</div></div><div class="editor-section-body">';
    h+='<div class="fg"><div class="fl">Exit label</div><input class="fi" value="'+esc(cfg.label||'')+'" placeholder="Describe this exit" oninput="setCfg(\''+nid+'\',\'label\',this.value)"></div>';
    if(n.type==='exit-dropped'){
      h+='<div class="fg"><div class="fl">Drop reason</div><select class="fs" onchange="setCfg(\''+nid+'\',\'drop_reason\',this.value)"><option value="no_whatsapp"'+(cfg.drop_reason==='no_whatsapp'?' selected':'')+'>No WhatsApp number</option><option value="condition_failed"'+(cfg.drop_reason==='condition_failed'?' selected':'')+'>Enrollment condition not met</option><option value="opted_out"'+(cfg.drop_reason==='opted_out'?' selected':'')+'>Opted out</option><option value="duplicate"'+(cfg.drop_reason==='duplicate'?' selected':'')+'>Duplicate contact</option><option value="custom"'+(cfg.drop_reason==='custom'?' selected':'')+'>Custom reason</option></select></div>';
      if(cfg.drop_reason==='custom')h+='<div class="fg"><div class="fl">Custom reason</div><input class="fi" value="'+esc(cfg.drop_reason_text||'')+'" placeholder="Describe why contact was dropped" oninput="setCfg(\''+nid+'\',\'drop_reason_text\',this.value)"></div>';
    }
    h+='<div class="helper'+(n.type==='exit-dropped'?' helper-warn':'')+'" style="margin-top:4px"><span class="helper-icon">'+ei.ic+'</span>'+ei.msg+'</div>';
    if(n.type==='exit-dropped')h+='<div class="helper helper-warn" style="margin-top:6px"><span class="helper-icon">📊</span>Dropped contacts appear in analytics with reason. They are <b>not</b> counted as failed — they never entered the flow.</div>';
    h+='</div></div>';
  }

  ni('stage-config',h);
}

/* ── UTILS ── */
function nt(id,v){var e=document.getElementById(id);if(e)e.textContent=v;}
function ni(id,v){var e=document.getElementById(id);if(e)e.innerHTML=v;}
function fmt(n){return Number(n||0).toLocaleString();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── INIT ── */
GB.sidebar('outbound');
initHeader();
clearEditor();
renderStepList();
document.getElementById('save-btn').onclick=saveCampaign;
document.getElementById('publish-btn').onclick=publishCampaign;

/* Auto-select root node */
(function(){var root=currentFlow.find(function(n){return !n.parentId;});if(root)selNode(root.id);})();

/* Keyboard shortcuts */
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'&&selectedNodeId){selectedNodeId=null;document.querySelectorAll('.step').forEach(function(x){x.classList.remove('on');});clearEditor();}
  if((e.metaKey||e.ctrlKey)&&e.key==='s'){e.preventDefault();saveCampaign();}
});
</script>
</body>
