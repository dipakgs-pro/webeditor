<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agents — Gallabox</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_gb.css">
<style>
.tbl-wrap{width:100%;border-collapse:collapse;font-size:13px}
.tbl-wrap th{background:#F9FAFB;padding:10px 14px;font-size:11.5px;font-weight:600;color:#64748B;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;border-bottom:2px solid #E2E8F0;position:sticky;top:0;z-index:2}
.tbl-wrap th:first-child,.tbl-wrap td:first-child{padding-left:24px}
.tbl-wrap th:last-child,.tbl-wrap td:last-child{padding-right:24px}
.tbl-wrap td{padding:12px 14px;border-bottom:1px solid #F1F5F9;color:#374151;vertical-align:middle;white-space:nowrap}
.tbl-wrap tr:hover td{background:#F9FAFB;cursor:pointer}
.agent-name-cell{max-width:320px;overflow:hidden;text-overflow:ellipsis;font-size:13.5px;font-weight:500;color:#0F172A}
.type-pill{background:#F1F5F9;color:#374151;font-size:12px;border-radius:20px;padding:3px 10px;display:inline-block}
.tbl-foot{position:sticky;bottom:0;background:#fff;border-top:1px solid #E2E8F0;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;font-size:13px;color:#374151;flex-shrink:0}
.tbl-foot select{border:1.5px solid #E2E8F0;border-radius:6px;padding:4px 8px;font-size:13px;color:#374151;background:#fff}
.pg-btn{padding:6px 14px;border:1.5px solid #E2E8F0;border-radius:6px;background:#fff;font-size:13px;color:#374151;cursor:pointer}
.pg-btn:hover:not(:disabled){background:#F9FAFB}
.pg-btn:disabled{opacity:.4;cursor:default}
.del-modal-bg{display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:200;align-items:center;justify-content:center}
.del-modal-bg.vis{display:flex}
.del-modal{background:#fff;border-radius:14px;padding:24px;width:360px;box-shadow:0 24px 64px rgba(15,23,42,.18)}
.act-menu{position:relative;display:inline-block}
.act-dropdown{display:none;position:fixed;background:#fff;border:1px solid #E2E8F0;border-radius:8px;box-shadow:0 6px 20px rgba(15,23,42,.14);z-index:500;min-width:130px;overflow:hidden}
.act-dropdown.open{display:block}
.act-dropdown button{display:block;width:100%;text-align:left;padding:9px 14px;background:transparent;border:none;font-size:13px;color:#374151;cursor:pointer}
.act-dropdown button:hover{background:#F9FAFB}
.act-dropdown button.danger{color:#EF4444}
</style>
</head>
<body>
<div style="background:#FFFBEB;height:40px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#92400E;flex-shrink:0">
  <strong>Upgrade your Shopify</strong>&nbsp;plan to unlock advanced AI features.&nbsp;<a href="#" style="color:#1B58E3;font-weight:600">Upgrade now →</a>
</div>

<div style="display:flex;height:calc(100vh - 40px);overflow:hidden">
  <div id="gb-sb"></div>
  <div class="gb-main" style="flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden">
    <div class="section-bar">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="section-title">AI Agents &amp; Bots</div>
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" title="Watch overview"><circle cx="9" cy="9" r="8" stroke="#CBD5E1" stroke-width="1.5"/><polygon points="7,5.5 14,9 7,12.5" fill="#94A3B8"/></svg>
      </div>
    </div>
    <div id="main-content" style="flex:1;overflow:auto;padding:0"></div>
  </div>
</div>

<div class="del-modal-bg" id="del-bg">
  <div class="del-modal">
    <div style="font-family:var(--fh);font-size:16px;font-weight:700;color:var(--n900);margin-bottom:8px">Delete agent?</div>
    <div style="font-size:13.5px;color:var(--n500);line-height:1.6;margin-bottom:20px" id="del-body"></div>
    <div style="display:flex;gap:10px">
      <button onclick="closeDel()" style="flex:1;padding:10px;background:transparent;color:var(--n700);border:1.5px solid var(--border);border-radius:8px;font-size:13.5px;font-weight:600">Cancel</button>
      <button onclick="confirmDel()" style="flex:1;padding:10px;background:var(--err);color:#fff;border:none;border-radius:8px;font-size:13.5px;font-weight:700">Delete agent</button>
    </div>
  </div>
</div>

<script src="_gb.js"></script>
<script>
'use strict';
GB.sidebar('web');

var LS_KEY = 'gb_agents';
var SEED = [
  {id:1,name:'E-Commerce - Lead Qualification',updatedAt:'Yesterday',createdAt:'Yesterday',sessions7d:0,status:'live'},
  {id:2,name:'Maya Web Channel V2',updatedAt:'21 May',createdAt:'21 May',sessions7d:0,status:'live'},
  {id:3,name:'Professional Services - Lead Qualification',updatedAt:'13 May',createdAt:'13 May',sessions7d:0,status:'draft'},
  {id:4,name:'Real Estate - FAQ',updatedAt:'12 May',createdAt:'12 May',sessions7d:0,status:'draft'},
  {id:5,name:'Finance - Lead Qualification',updatedAt:'7 May',createdAt:'7 May',sessions7d:0,status:'draft'},
  {id:6,name:'Real Estate - Lead Qualification',updatedAt:'5 May',createdAt:'5 May',sessions7d:0,status:'draft'},
  {id:7,name:'Professional Services - Lead Qualification (v2)',updatedAt:'27 Apr',createdAt:'27 Apr',sessions7d:0,status:'draft'},
  {id:8,name:'QA Web Channel',updatedAt:'27 Apr',createdAt:'27 Apr',sessions7d:0,status:'draft'},
  {id:9,name:'Travel - Post Booking Support',updatedAt:'27 Apr',createdAt:'27 Apr',sessions7d:0,status:'draft'},
];

function loadAgents() {
  var stored = GB.ls.get(LS_KEY, null);
  if (stored === null) { GB.ls.set(LS_KEY, SEED); return SEED.slice(); }  /* first visit only */
  if (!Array.isArray(stored) || stored.length === 0) return [];           /* deliberately empty (after Reset) */
  return stored.map(function(a) {
    return Object.assign({updatedAt:'—',createdAt:'—',sessions7d:0,status:'draft'}, a);
  });
}
function saveAgents(arr){ GB.ls.set(LS_KEY, arr); }

var AGENTS = loadAgents();
var pendingDel = null;
var searchQ = '';
var rowsPerPage = 20;
var page = 1;

function filtered() {
  if (!searchQ) return AGENTS;
  var q = searchQ.toLowerCase();
  return AGENTS.filter(function(a){ return a.name.toLowerCase().indexOf(q) !== -1; });
}

function render() {
  AGENTS = loadAgents();
  var wrap = document.getElementById('main-content');
  if (AGENTS.length === 0) { renderEmpty(wrap); } else { renderList(wrap); }
}

function renderList(wrap) {
  var rows = filtered();
  var total = rows.length;
  var totalPages = Math.max(1, Math.ceil(total / rowsPerPage));
  if (page > totalPages) page = totalPages;
  var start = (page - 1) * rowsPerPage;
  var pageRows = rows.slice(start, start + rowsPerPage);

  var infoSvg = '<svg width="13" height="13" viewBox="0 0 13 13" fill="none" style="vertical-align:middle;margin-left:4px"><circle cx="6.5" cy="6.5" r="5.75" stroke="#CBD5E1" stroke-width="1.5"/><rect x="6" y="5.5" width="1" height="4" rx=".5" fill="#CBD5E1"/><circle cx="6.5" cy="4" r=".6" fill="#CBD5E1"/></svg>';
  var globeSvg = '<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="#1B58E3" stroke-width="1.5"/><ellipse cx="8" cy="8" rx="2.8" ry="6.5" stroke="#1B58E3" stroke-width="1.5"/><line x1="1.5" y1="8" x2="14.5" y2="8" stroke="#1B58E3" stroke-width="1.5"/></svg>';

  var trs = pageRows.map(function(a) {
    return '<tr onclick="goManage(event,' + a.id + ')">'
      + '<td><div class="agent-name-cell">' + GB.esc(a.name) + '</div></td>'
      + '<td><span class="type-pill">Chat AI Agent</span></td>'
      + '<td style="text-align:center">' + globeSvg + '</td>'
      + '<td>' + GB.esc(a.updatedAt) + infoSvg + '</td>'
      + '<td>' + GB.esc(a.createdAt) + infoSvg + '</td>'
      + '<td>' + (a.sessions7d || 0) + '</td>'
      + '<td onclick="event.stopPropagation()" style="text-align:center">'
      + '<div class="act-menu">'
      + '<button onclick="toggleMenu(event,\'m' + a.id + '\')" style="background:none;border:none;cursor:pointer;font-size:18px;color:#94A3B8;padding:4px 8px;border-radius:6px;line-height:1">⋮</button>'
      + '<div class="act-dropdown" id="m' + a.id + '">'
      + '<button onclick="goManage(event,' + a.id + ')">Manage</button>'
      + '<button class="danger" onclick="startDel(' + a.id + ')">Delete</button>'
      + '</div></div></td>'
      + '</tr>';
  }).join('');

  var showing = total === 0 ? 'No results' : 'Showing ' + (start + 1) + ' – ' + Math.min(start + rowsPerPage, total) + ' of ' + total + ' items';

  wrap.innerHTML = '<div style="padding:12px 24px;display:flex;align-items:center;gap:10;justify-content:space-between;border-bottom:1px solid #E2E8F0;flex-shrink:0">'
    + '<input type="search" id="srch" placeholder="Search by agent name" value="' + GB.esc(searchQ) + '" style="width:260px;padding:8px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;color:#374151;outline:none" oninput="onSearch(this.value)">'
    + '<div style="display:flex;gap:8px;margin-left:auto">'
    + '<button onclick="resetAgents()" title="Clear all agents to test empty state" style="padding:8px 14px;background:transparent;color:#94A3B8;border:1.5px dashed #E2E8F0;border-radius:8px;font-size:12px;cursor:pointer">Reset</button>'
    + '<button onclick="window.location.href=\'gallabox-onboarding.html\'" style="padding:8px 18px;background:#1B58E3;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">+ Create Agent</button>'
    + '</div>'
    + '</div>'
    + '<div style="flex:1;overflow:auto">'
    + '<table class="tbl-wrap"><thead><tr>'
    + '<th style="min-width:280px">Agent Name</th>'
    + '<th style="width:140px">Type</th>'
    + '<th style="width:100px;text-align:center">Medium</th>'
    + '<th style="width:130px">Last Updated</th>'
    + '<th style="width:130px">Created On</th>'
    + '<th style="width:160px">Last 7 Days Sessions</th>'
    + '<th style="width:60px"></th>'
    + '</tr></thead>'
    + '<tbody>' + (trs || '<tr><td colspan="7" style="text-align:center;color:#94A3B8;padding:32px">No agents found</td></tr>') + '</tbody>'
    + '</table></div>'
    + '<div class="tbl-foot">'
    + '<div style="display:flex;align-items:center;gap:8px">Show rows per page <select onchange="setRows(+this.value)">'
    + [20,50,100].map(function(n){return '<option value="'+n+'"'+(n===rowsPerPage?' selected':'')+'>'+n+'</option>';}).join('')
    + '</select></div>'
    + '<div style="display:flex;align-items:center;gap:12px"><span>' + showing + '</span>'
    + '<button class="pg-btn" onclick="setPage(' + (page-1) + ')"' + (page<=1?' disabled':'') + '>Previous</button>'
    + '<button class="pg-btn" onclick="setPage(' + (page+1) + ')"' + (page>=totalPages?' disabled':'') + '>Next</button>'
    + '</div></div>';
}

var _ART_PANEL = 'width:190px;background:#fff;border-radius:14px;border:1px solid #E2E8F0;box-shadow:0 2px 10px rgba(15,23,42,.07);overflow:hidden;flex-shrink:0';
var _ART_LBL = 'padding:8px 12px;border-top:1px solid #F1F5F9;text-align:center;font-size:10.5px;font-weight:700;color:#64748B;letter-spacing:.05em;text-transform:uppercase';

  + '<svg width="28" height="16" viewBox="0 0 28 16" fill="none"><line x1="0" y1="8" x2="20" y2="8" stroke="#CBD5E1" stroke-width="1.5"/><path d="M16 4l4 4-4 4" stroke="#CBD5E1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>'
  + '</div>';

var _artChat = '<div style="' + _ART_PANEL + '">'
  /* header */
  + '<div style="background:#1B58E3;padding:9px 11px;display:flex;align-items:center;gap:7px">'
  + '<div style="width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0">'
  + '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>'
  + '</div>'
  + '<div><div style="font-size:11px;font-weight:700;color:#fff">Maya</div><div style="font-size:9px;color:rgba(255,255,255,.65)">Online</div></div>'
  + '</div>'
  /* messages */
  + '<div style="padding:9px 9px 6px;background:#F8FAFC;display:flex;flex-direction:column;gap:6px;min-height:102px">'
  + '<div style="display:flex;gap:5px;align-items:flex-end">'
  + '<div style="width:18px;height:18px;border-radius:50%;background:#EFF4FF;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px">&#x1F916;</div>'
  + '<div style="background:#fff;border-radius:8px 8px 8px 2px;padding:5px 8px;font-size:10px;color:#374151;box-shadow:0 1px 3px rgba(0,0,0,.06)">How can I help you?</div>'
  + '</div>'
  + '<div style="display:flex;justify-content:flex-end">'

var _artLead = '<div style="' + _ART_PANEL + '">'

  + '<span style="font-size:10.5px;color:#64748B;font-weight:500">Intent</span>'
  + '<span style="font-size:10px;font-weight:700;color:#16A34A;background:#F0FDF4;border-radius:4px;padding:2px 7px">High</span>'
  + '</div>'
  + '<div>'

function renderEmpty(wrap) {
  wrap.innerHTML = '<div style="padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #E2E8F0">'
    + '<input type="search" placeholder="Search by agent name" style="width:280px;padding:8px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;color:#374151">'
    + '<button onclick="window.location.href=\'gallabox-onboarding.html\'" style="padding:8px 18px;background:#1B58E3;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">+ Create Agent</button>'
    + '</div>'
    + '<div class="gb-empty">'
    + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:28px">'
    + _artWidget + _artArrow + _artChat + _artArrow + _artLead
    + '</div>'
    + '<div class="gb-empty-title">Create your first Web Agent</div>'
    + '<div class="gb-empty-sub">Capture leads from your website, run AI conversations, and route qualified contacts to WhatsApp — automatically.</div>'
    + '<div style="display:flex;gap:10px;justify-content:center">'
    + '<button class="btn btn-p" onclick="window.location.href=\'gallabox-onboarding.html\'">+ Create Web Agent</button>'

    + '</div></div>';
}

function goManage(e, id) { e.stopPropagation(); window.location.href = 'GBWebWidget.html?mode=manage&id=' + id; }
function onSearch(v) { searchQ = v; page = 1; render(); }
function setRows(n) { rowsPerPage = n; page = 1; render(); }
function setPage(n) { page = n; render(); }
function toggleMenu(e, id) {
  e.stopPropagation();
  var allOpen = document.querySelectorAll('.act-dropdown.open');
  allOpen.forEach(function(d){ d.classList.remove('open'); });
  var m = document.getElementById(id);
  if (m.classList.contains('open')) return;
  var btn = e.currentTarget;
  var r = btn.getBoundingClientRect();
  m.style.top  = (r.bottom + 4) + 'px';
  m.style.left = (r.right - 132) + 'px';
  m.classList.add('open');
}
document.addEventListener('click', function(){ document.querySelectorAll('.act-dropdown.open').forEach(function(d){ d.classList.remove('open'); }); });

function startDel(id) {
  pendingDel = id;
  var a = AGENTS.find(function(x){ return x.id === id; });
  var name = a ? a.name : 'this agent';
  var isLast = AGENTS.length <= 1;
  var body = document.getElementById('del-body');
  body.innerHTML = 'This will permanently remove <strong>' + GB.esc(name) + '</strong> and all its configuration.'
    + '<div style="margin-top:10px;padding:9px 12px;background:#FFF7ED;border:1px solid #FED7AA;border-radius:7px;font-size:12px;color:#92400E;line-height:1.55">'
    + (isLast ? '⚠️ This is your last agent. The list will show empty after deletion.' : '')
    + ' Visitor Analytics data attributed to this agent (sessions, chat rate) will no longer update.'
    + '</div>';
  document.getElementById('del-bg').classList.add('vis');
}
function closeDel(){ pendingDel = null; document.getElementById('del-bg').classList.remove('vis'); }
function confirmDel(){
  if (pendingDel === null) return;
  var delAgent = AGENTS.find(function(a){ return a.id === pendingDel; });
  AGENTS = AGENTS.filter(function(a){ return a.id !== pendingDel; });
  saveAgents(AGENTS);
  // Remove the agent's URL from gb_channels if no other agent shares the same domain
  if (delAgent && delAgent.url && delAgent.url !== '—') {
    var domain = delAgent.url.replace(/^https?:\/\//,'').split('/')[0].split('?')[0];
    var stillUsed = AGENTS.some(function(a){
      return a.url && a.url.replace(/^https?:\/\//,'').split('/')[0].split('?')[0] === domain;
    });
    if (!stillUsed && domain) {
      try {
        var ch = JSON.parse(localStorage.getItem('gb_channels')||'[]');
        ch = ch.filter(function(c){ return c !== domain; });
        localStorage.setItem('gb_channels', JSON.stringify(ch));
      } catch(e) {}
    }
  }
  closeDel(); render();
}

function resetAgents(){ GB.ls.set(LS_KEY, []); AGENTS=[]; render(); }

document.getElementById('del-bg').addEventListener('click', function(e){ if(e.target===this) closeDel(); });
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeDel(); });

render();
</script>
</body>
</html>
